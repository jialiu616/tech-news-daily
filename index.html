<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tech News Daily</title>
  <meta name="description" content="Top 100 tech news curated daily from Hacker News, Reddit, TechCrunch, and more">
  <link rel="icon" href="assets/favicon.ico" type="image/x-icon">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <!-- Header -->
  <header class="site-header">
    <div class="container header-content">
      <h1 class="site-title"><span class="accent">&gt;_</span> Tech News Daily</h1>
      <p class="site-subtitle" data-i18n="subtitle">Top 100 curated tech stories, refreshed daily</p>
      <div class="header-meta">
        <span id="lastUpdated" data-i18n-prefix="lastUpdated"></span>
        <select id="langSelector" class="lang-selector" aria-label="Language">
          <option value="auto">Auto</option>
          <option value="en">English</option>
          <option value="zh">中文</option>
        </select>
      </div>
    </div>
  </header>

  <!-- Sticky Toolbar -->
  <nav class="toolbar">
    <div class="container toolbar-inner">
      <!-- Date Navigation -->
      <div class="date-nav">
        <button id="prevDay" aria-label="Previous day">&larr;</button>
        <input type="date" id="datePicker" class="date-input" aria-label="Select date">
        <button id="nextDay" aria-label="Next day">&rarr;</button>
        <button id="todayBtn" class="active" data-i18n="today">Today</button>
      </div>

      <!-- Source Filters -->
      <div id="sourceFilters" class="source-filters">
        <!-- Pills generated by JS -->
      </div>

      <!-- Search -->
      <div class="search-box">
        <span class="search-icon">&#x1F50D;</span>
        <input type="search" id="searchInput" class="search-input" data-i18n-placeholder="searchPlaceholder" placeholder="Search...">
      </div>
    </div>
  </nav>

  <!-- Stats Bar -->
  <div class="stats-bar container" id="statsBar">
    <div class="stat-item">
      <span data-i18n="articles">Articles</span>:&nbsp;<span class="stat-value" id="statCount">--</span>
    </div>
    <div class="stat-item">
      <span data-i18n="sources">Sources</span>:&nbsp;<span class="stat-value" id="statSources">--</span>
    </div>
    <div class="stat-item">
      <span data-i18n="date">Date</span>:&nbsp;<span class="stat-value" id="statDate">--</span>
    </div>
  </div>

  <!-- Main Content -->
  <main class="main-content">
    <div class="container">
      <section class="news-grid" id="newsGrid">
        <!-- Cards rendered by JS -->
      </section>
    </div>
  </main>

  <!-- Footer -->
  <footer class="site-footer">
    <div class="container footer-inner">
      <div class="mini-calendar" id="miniCalendar">
        <!-- Calendar rendered by JS -->
      </div>
      <p class="footer-credits">
        <span data-i18n="footerPowered">Powered by open APIs</span> &middot;
        <span data-i18n="footerUpdated">Updated daily at 06:00 UTC</span>
      </p>
    </div>
  </footer>

  <script type="module" src="js/app.js"></script>
</body>
</html>
